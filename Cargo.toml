[package]
name = "qualirs"
version = "0.1.0"
edition = "2024"
description = "Structural and architectural code smell detector for Rust"
license = "MIT"

[lib]
name = "qualirs"
path = "src/lib.rs"

[[bin]]
name = "qualirs"
path = "src/main.rs"

[dependencies]
# AST parsing
syn = { version = "2", features = ["full", "extra-traits", "visit", "parsing", "printing"] }
proc-macro2 = { version = "1", features = ["span-locations"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Terminal output
colored = "3"
comfy-table = "7"

# Config
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# File walking
ignore = "0.4"

# Parallelism
rayon = "1"

# Error handling
thiserror = "2"
anyhow = "1"

[dev-dependencies]
tempfile = "3"
